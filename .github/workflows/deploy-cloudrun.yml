name: Deploy Cloud Run

# Merge/push to main, or tap "Run workflow" on GitHub → Cloud Run updates.
# One-time secrets: docs/DEPLOY_GCP.md (section "Update without your Mac")
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      region:
        description: "GCP region"
        required: false
        default: "asia-southeast1"

permissions:
  contents: read

env:
  REGION: ${{ github.event.inputs.region || 'asia-southeast1' }}
  REPO: banker-crm
  API_SERVICE: banker-crm-api
  WEB_SERVICE: banker-crm-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          CRM_API_USER: ${{ secrets.CRM_API_USER }}
          CRM_API_PASSWORD: ${{ secrets.CRM_API_PASSWORD }}
          CRM_JWT_SECRET: ${{ secrets.CRM_JWT_SECRET }}
        run: |
          missing=0
          for name in GCP_PROJECT_ID GCP_SA_KEY CRM_API_USER CRM_API_PASSWORD CRM_JWT_SECRET; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets per docs/DEPLOY_GCP.md then re-run." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure project
        run: |
          gcloud config set project "${{ secrets.GCP_PROJECT_ID }}"
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            --quiet
          if ! gcloud artifacts repositories describe "$REPO" --location="$REGION" >/dev/null 2>&1; then
            gcloud artifacts repositories create "$REPO" \
              --repository-format=docker \
              --location="$REGION" \
              --description="Banker CRM images"
          fi

      - name: Build & push API image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO}/api:latest"
          gcloud builds submit . \
            --config=cloudbuild.api.yaml \
            --substitutions="_IMAGE=${IMAGE}"
          echo "API_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy API (temp CORS)
        run: |
          STORAGE_BACKEND="${{ secrets.CRM_STORAGE_BACKEND }}"
          STORAGE_BACKEND="${STORAGE_BACKEND:-local}"
          ENV_FILE="$(mktemp)"
          {
            echo "CRM_API_USER: \"${{ secrets.CRM_API_USER }}\""
            echo "CRM_API_PASSWORD: \"${{ secrets.CRM_API_PASSWORD }}\""
            echo "CRM_JWT_SECRET: \"${{ secrets.CRM_JWT_SECRET }}\""
            echo "CRM_STORAGE_BACKEND: \"${STORAGE_BACKEND}\""
            echo "CRM_LOCAL_STORAGE_PATH: \"/tmp/crm-files\""
            echo "CRM_API_CORS_ORIGINS: \"http://localhost:3000\""
          } >"$ENV_FILE"
          if [ -n "${{ secrets.CRM_DB_URL }}" ]; then
            echo "CRM_DB_URL: \"${{ secrets.CRM_DB_URL }}\"" >>"$ENV_FILE"
          fi
          if [ -n "${{ secrets.CRM_S3_BUCKET }}" ]; then
            {
              echo "CRM_S3_ENDPOINT_URL: \"${{ secrets.CRM_S3_ENDPOINT_URL }}\""
              echo "CRM_S3_REGION: \"${{ secrets.CRM_S3_REGION }}\""
              echo "CRM_S3_BUCKET: \"${{ secrets.CRM_S3_BUCKET }}\""
              echo "CRM_S3_ACCESS_KEY_ID: \"${{ secrets.CRM_S3_ACCESS_KEY_ID }}\""
              echo "CRM_S3_SECRET_ACCESS_KEY: \"${{ secrets.CRM_S3_SECRET_ACCESS_KEY }}\""
              echo "CRM_S3_PREFIX: \"banker-crm\""
            } >>"$ENV_FILE"
          fi

          gcloud run deploy "$API_SERVICE" \
            --image="$API_IMAGE" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --env-vars-file="$ENV_FILE"

          API_URL="$(gcloud run services describe "$API_SERVICE" --region="$REGION" --format='value(status.url)')"
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"

      - name: Build & push Web image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO}/web:latest"
          BUILD_ID="$(date -u +%Y-%m-%d)-${GITHUB_SHA::7}"
          gcloud builds submit web \
            --config=web/cloudbuild.yaml \
            --substitutions="_IMAGE=${IMAGE},_API_URL=${API_URL},_WEB_BUILD_ID=${BUILD_ID}"
          echo "WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "WEB_BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"

      - name: Deploy Web
        run: |
          gcloud run deploy "$WEB_SERVICE" \
            --image="$WEB_IMAGE" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3
          WEB_URL="$(gcloud run services describe "$WEB_SERVICE" --region="$REGION" --format='value(status.url)')"
          echo "WEB_URL=$WEB_URL" >> "$GITHUB_ENV"

      - name: Point API CORS at web URL
        run: |
          STORAGE_BACKEND="${{ secrets.CRM_STORAGE_BACKEND }}"
          STORAGE_BACKEND="${STORAGE_BACKEND:-local}"
          ENV_FILE="$(mktemp)"
          {
            echo "CRM_API_USER: \"${{ secrets.CRM_API_USER }}\""
            echo "CRM_API_PASSWORD: \"${{ secrets.CRM_API_PASSWORD }}\""
            echo "CRM_JWT_SECRET: \"${{ secrets.CRM_JWT_SECRET }}\""
            echo "CRM_STORAGE_BACKEND: \"${STORAGE_BACKEND}\""
            echo "CRM_LOCAL_STORAGE_PATH: \"/tmp/crm-files\""
            echo "CRM_API_CORS_ORIGINS: \"${WEB_URL}\""
          } >"$ENV_FILE"
          if [ -n "${{ secrets.CRM_DB_URL }}" ]; then
            echo "CRM_DB_URL: \"${{ secrets.CRM_DB_URL }}\"" >>"$ENV_FILE"
          fi
          if [ -n "${{ secrets.CRM_S3_BUCKET }}" ]; then
            {
              echo "CRM_S3_ENDPOINT_URL: \"${{ secrets.CRM_S3_ENDPOINT_URL }}\""
              echo "CRM_S3_REGION: \"${{ secrets.CRM_S3_REGION }}\""
              echo "CRM_S3_BUCKET: \"${{ secrets.CRM_S3_BUCKET }}\""
              echo "CRM_S3_ACCESS_KEY_ID: \"${{ secrets.CRM_S3_ACCESS_KEY_ID }}\""
              echo "CRM_S3_SECRET_ACCESS_KEY: \"${{ secrets.CRM_S3_SECRET_ACCESS_KEY }}\""
              echo "CRM_S3_PREFIX: \"banker-crm\""
            } >>"$ENV_FILE"
          fi
          gcloud run services update "$API_SERVICE" \
            --region="$REGION" \
            --env-vars-file="$ENV_FILE"

      - name: Summary
        run: |
          {
            echo "### Cloud Run updated"
            echo "- **iPad URL:** ${WEB_URL}"
            echo "- **API docs:** ${API_URL}/docs"
            echo "- **Build stamp (sidebar):** ${WEB_BUILD_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
