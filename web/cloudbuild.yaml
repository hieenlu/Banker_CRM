steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_IMAGE
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_API_URL
      - --build-arg
      - CRM_API_ORIGIN=$_API_URL
      - --build-arg
      - NEXT_PUBLIC_WEB_BUILD_ID=$_WEB_BUILD_ID
      - .
images:
  - $_IMAGE
substitutions:
  _IMAGE: banker-crm-web
  _API_URL: http://127.0.0.1:8000
  _WEB_BUILD_ID: dev-local
options:
  logging: CLOUD_LOGGING_ONLY
